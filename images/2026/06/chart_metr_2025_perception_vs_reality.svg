<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="650" viewBox="0 0 1000 650">
<style>text{font-family:Arial,Helvetica,sans-serif;fill:#111827} .small{font-size:16px;fill:#4b5563} .title{font-size:34px;font-weight:700} .subtitle{font-size:20px;fill:#374151} .axis{font-size:16px;fill:#6b7280} .label{font-size:18px} .value{font-size:18px;font-weight:700}</style>
<rect width="100%" height="100%" fill="white"/>
<text x="40" y="55" class="title">AI felt faster. It was slower.</text>
<text x="40" y="85" class="subtitle">METR study of experienced open-source developers (2025)</text>
<line x1="90" y1="510.0" x2="950" y2="510.0" stroke="#e5e7eb" stroke-width="1"/>
<text x="78" y="515.0" text-anchor="end" class="axis">-20%</text>
<line x1="90" y1="430.0" x2="950" y2="430.0" stroke="#e5e7eb" stroke-width="1"/>
<text x="78" y="435.0" text-anchor="end" class="axis">-10%</text>
<line x1="90" y1="350.0" x2="950" y2="350.0" stroke="#e5e7eb" stroke-width="1"/>
<text x="78" y="355.0" text-anchor="end" class="axis">0%</text>
<line x1="90" y1="270.0" x2="950" y2="270.0" stroke="#e5e7eb" stroke-width="1"/>
<text x="78" y="275.0" text-anchor="end" class="axis">10%</text>
<line x1="90" y1="190.0" x2="950" y2="190.0" stroke="#e5e7eb" stroke-width="1"/>
<text x="78" y="195.0" text-anchor="end" class="axis">20%</text>
<line x1="90" y1="110.0" x2="950" y2="110.0" stroke="#e5e7eb" stroke-width="1"/>
<text x="78" y="115.0" text-anchor="end" class="axis">30%</text>
<rect x="161.7" y="158.0" width="143.3" height="192.0" fill="#22c55e" rx="6"/>
<text x="233.3" y="146.0" text-anchor="middle" class="value">+24%</text>
<text x="233.3" y="545" text-anchor="middle" class="label">Expected before task</text>
<rect x="448.3" y="350.0" width="143.3" height="152.0" fill="#dc2626" rx="6"/>
<text x="520.0" y="530.0" text-anchor="middle" class="value">-19%</text>
<text x="520.0" y="545" text-anchor="middle" class="label">Observed actual result</text>
<rect x="735.0" y="190.0" width="143.3" height="160.0" fill="#f59e0b" rx="6"/>
<text x="806.7" y="178.0" text-anchor="middle" class="value">+20%</text>
<text x="806.7" y="545" text-anchor="middle" class="label">Believed after task</text>
<text x="40" y="595" class="small">Source: METR, “Measuring the Impact of Early-2025 AI on Experienced Open-Source Developer Productivity”.</text>
<text x="40" y="615" class="small">Article text reports developers expected +24%, observed -19% (19% slower), and still believed after the task that AI had sped them up by +20%.</text>
</svg>